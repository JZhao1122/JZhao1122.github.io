baseURL = "https://JZhao1122.github.io/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "𝓙"
theme = "PaperMod"

enableInlineShortcodes = true
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[markup]
  [markup.highlight]
    style = "github"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true
  mainSections = ["posts"]

[[menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/"
  weight = 10
